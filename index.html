<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memorial of the World Around - AR</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui; background: #000; }
        #controls { position: fixed; bottom: 30px; left: 0; right: 0; text-align: center; z-index: 200; }
        #start-btn { background: #c5a059; color: #000; border: none; padding: 14px 32px; font-size: 16px; font-weight: 600; border-radius: 40px; cursor: pointer; }
        #status { position: fixed; top: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.85); color: #c5a059; padding: 12px; border-radius: 8px; text-align: center; font-size: 12px; z-index: 200; }
        .instruction { position: fixed; bottom: 110px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.5); font-size: 11px; z-index: 200; }
        a-scene { width: 100%; height: 100%; }
        .hidden { display: none; }
    </style>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <div id="controls">
        <button id="start-btn">START AR</button>
    </div>
    <div id="status">Ready. Tap START AR to begin.</div>
    <div class="instruction">Point camera at the Memorial of the World Around poster</div>

    <a-scene id="scene" 
             mindar-image="imageTargetSrc: ./target.mind; autoStart: false;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false" 
             embedded>
        
        <a-assets>
            <a-asset-item id="radio-model" src="./assets.glb"></a-asset-item>
        </a-assets>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity gltf-model="#radio-model"
                      scale="0.5 0.5 0.5"
                      position="0 0.2 0"
                      rotation="0 180 0">
            </a-entity>
        </a-entity>
        
        <a-entity camera="active: true" look-controls></a-entity>
    </a-scene>

    <script>
        const startButton = document.getElementById('start-btn');
        const sceneEl = document.getElementById('scene');
        const statusDiv = document.getElementById('status');
        
        // Wait for MindAR to be ready before exposing start function
        function waitForMindAR() {
            return new Promise((resolve) => {
                const checkInterval = setInterval(() => {
                    const mindarImage = sceneEl.components['mindar-image'];
                    if (mindarImage && typeof mindarImage.start === 'function') {
                        clearInterval(checkInterval);
                        resolve(mindarImage);
                    }
                }, 100);
                
                // Timeout after 10 seconds
                setTimeout(() => {
                    clearInterval(checkInterval);
                    resolve(null);
                }, 10000);
            });
        }
        
        async function startAR() {
            statusDiv.innerHTML = 'Requesting camera access...';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                stream.getTracks().forEach(track => track.stop());
                
                statusDiv.innerHTML = 'Waiting for AR engine...';
                
                const mindarImage = await waitForMindAR();
                
                if (!mindarImage) {
                    throw new Error('AR engine did not load. Please refresh the page.');
                }
                
                statusDiv.innerHTML = 'Starting AR...';
                await mindarImage.start();
                
                statusDiv.innerHTML = 'Camera active. Scan your poster.';
                startButton.classList.add('hidden');
                
                sceneEl.addEventListener('targetFound', () => {
                    statusDiv.innerHTML = 'Poster detected! Model loading.';
                });
                
                sceneEl.addEventListener('targetLost', () => {
                    statusDiv.innerHTML = 'Poster lost. Reposition camera.';
                });
                
            } catch (err) {
                statusDiv.innerHTML = 'Error: ' + err.message;
                console.error(err);
                startButton.classList.remove('hidden');
            }
        }
        
        startButton.addEventListener('click', startAR);
    </script>
</body>
</html>
