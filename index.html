<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memorial of the World Around - AR</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #000; }
        
        #controls {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 200;
            pointer-events: none;
        }
        
        #start-btn {
            pointer-events: auto;
            background: #c5a059;
            color: #000;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
            letter-spacing: 0.5px;
        }
        
        #start-btn:active { transform: scale(0.97); }
        
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: #c5a059;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            z-index: 200;
            font-family: monospace;
            border: 1px solid rgba(197,160,89,0.3);
            pointer-events: none;
        }
        
        .instruction {
            position: fixed;
            bottom: 110px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            z-index: 200;
            pointer-events: none;
            letter-spacing: 0.3px;
        }
        
        a-scene { width: 100%; height: 100%; }
        .hidden { display: none; }
        
        #error-box {
            position: fixed;
            bottom: 180px;
            left: 20px;
            right: 20px;
            background: rgba(220, 50, 50, 0.95);
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            z-index: 300;
            display: none;
            backdrop-filter: blur(8px);
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
    <div id="controls">
        <button id="start-btn">START AR</button>
    </div>
    <div id="status">
        Ready. Tap START AR to begin.
    </div>
    <div class="instruction">
        Point camera at the Memorial of the World Around poster
    </div>
    <div id="error-box"></div>

    <a-scene id="scene" 
             mindar-image="imageTargetSrc: marker.patt; autoStart: false;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false" 
             embedded>
        
        <a-assets>
            <a-asset-item id="assets-model" src="assets.glb"></a-asset-item>
        </a-assets>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity gltf-model="#assets-model"
                      scale="0.5 0.5 0.5"
                      position="0 0.2 0"
                      rotation="0 180 0">
            </a-entity>
            <a-light type="point" color="#c5a059" intensity="0.5" distance="2" position="0 0.5 0"></a-light>
        </a-entity>
        
        <a-entity camera="active: true" look-controls></a-entity>
    </a-scene>

    <script>
        const startButton = document.getElementById('start-btn');
        const sceneEl = document.getElementById('scene');
        const statusDiv = document.getElementById('status');
        const errorBox = document.getElementById('error-box');
        
        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            statusDiv.innerHTML = 'Error: ' + msg.substring(0, 60);
            setTimeout(() => {
                errorBox.style.display = 'none';
            }, 8000);
        }
        
        function updateStatus(msg, isError = false) {
            statusDiv.innerHTML = msg;
            statusDiv.style.color = isError ? '#ff8888' : '#c5a059';
            console.log(msg);
        }
        
        async function startAR() {
            updateStatus('Requesting camera access...');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                
                const videoTracks = stream.getVideoTracks();
                if (videoTracks.length === 0) {
                    throw new Error('No video track found');
                }
                
                console.log('Camera granted:', videoTracks[0].label);
                stream.getTracks().forEach(track => track.stop());
                
                updateStatus('Starting AR...');
                
                setTimeout(() => {
                    try {
                        const mindarImage = sceneEl.components['mindar-image'];
                        
                        if (mindarImage && typeof mindarImage.start === 'function') {
                            mindarImage.start().then(() => {
                                updateStatus('Camera active. Scan your poster.');
                                startButton.classList.add('hidden');
                                
                                sceneEl.addEventListener('targetFound', () => {
                                    updateStatus('Poster detected. Model loading.');
                                    if (navigator.vibrate) navigator.vibrate(50);
                                    setTimeout(() => {
                                        if (statusDiv.innerHTML.includes('detected')) {
                                            updateStatus('Radio floating above poster.');
                                        }
                                    }, 2000);
                                });
                                
                                sceneEl.addEventListener('targetLost', () => {
                                    updateStatus('Poster lost. Reposition camera.');
                                });
                                
                            }).catch(err => {
                                console.error('MindAR start error:', err);
                                showError('AR start failed: ' + err.message);
                                updateStatus('AR failed. Refresh and try again.', true);
                                startButton.classList.remove('hidden');
                            });
                        } else {
                            throw new Error('MindAR component not ready. Please refresh the page.');
                        }
                    } catch (err) {
                        console.error('MindAR error:', err);
                        showError(err.message);
                        updateStatus('AR component error. Refresh page.', true);
                        startButton.classList.remove('hidden');
                    }
                }, 100);
                
            } catch (err) {
                console.error('Camera permission error:', err);
                
                if (err.name === 'NotAllowedError') {
                    const msg = 'Camera permission denied. Go to Settings > Safari > Camera > Allow.';
                    showError(msg);
                    updateStatus('Camera denied. Check Safari settings.', true);
                } else if (err.name === 'NotFoundError') {
                    showError('No camera found on this device.');
                    updateStatus('No camera detected.', true);
                } else {
                    showError('Camera error: ' + err.message);
                    updateStatus('Camera error. Tap START AR again.', true);
                }
                startButton.classList.remove('hidden');
            }
        }
        
        function waitForMindAR() {
            return new Promise((resolve) => {
                const checkInterval = setInterval(() => {
                    if (sceneEl.components && sceneEl.components['mindar-image']) {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 100);
                setTimeout(() => clearInterval(checkInterval), 5000);
            });
        }
        
        startButton.addEventListener('click', async () => {
            await waitForMindAR();
            startAR();
        });
        
        window.addEventListener('error', (e) => {
            console.error('Global error:', e.error);
            if (!startButton.classList.contains('hidden')) {
                updateStatus('Page error. Refresh and try again.', true);
            }
        });
    </script>
</body>
</html>
