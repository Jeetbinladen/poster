<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memorial AR - Simple Version</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui; }
        .info { position: fixed; bottom: 20px; left: 0; right: 0; text-align: center; color: gold; background: rgba(0,0,0,0.6); padding: 10px; z-index: 100; font-size: 14px; pointer-events: none; }
        button { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 200; padding: 12px 24px; background: #c5a059; color: black; border: none; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <button id="start">📷 START CAMERA</button>
    <div class="info" id="status">⚠️ Tap START CAMERA</div>
    
    <a-scene id="scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-nft type="nft" url="marker.patt" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
            <a-entity gltf-model="radio1.glb" scale="0.3 0.3 0.3" position="0 0 0" rotation="0 180 0"></a-entity>
        </a-nft>
        <a-entity camera></a-entity>
    </a-scene>
    
    <script>
        const startBtn = document.getElementById('start');
        const scene = document.getElementById('scene');
        const statusDiv = document.getElementById('status');
        
        startBtn.addEventListener('click', async () => {
            statusDiv.innerHTML = '📷 Requesting camera...';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(t => t.stop());
                scene.setAttribute('arjs', 'sourceType', 'webcam');
                scene.components['arjs'].start();
                statusDiv.innerHTML = '✅ Camera active. Point at poster!';
                startBtn.style.display = 'none';
            } catch (err) {
                statusDiv.innerHTML = '❌ Camera error: ' + err.message;
                alert('Go to Settings → Safari → Camera → Allow');
            }
        });
    </script>
</body>
</html>
