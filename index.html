<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memorial of the World Around - AR</title>
    
    <!-- MindAR Core -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.prod.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #000;
            overflow: hidden;
        }
        
        #ar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #controls {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 200;
        }
        
        #start-btn {
            background: #c5a059;
            color: #000;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        
        #start-btn:active {
            transform: scale(0.96);
        }
        
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #c5a059;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            z-index: 200;
            backdrop-filter: blur(5px);
            font-family: monospace;
        }
        
        .instruction {
            position: fixed;
            bottom: 100px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            z-index: 200;
            background: rgba(0,0,0,0.5);
            padding: 8px;
        }
        
        a-scene {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="ar-container">
        <a-scene mindar-image="imageTargetSrc: marker.patt; autoStart: false; uiLoading: false; uiScanning: false; uiError: false;"
                 vr-mode-ui="enabled: false"
                 device-orientation-permission-ui="enabled: false"
                 embedded
                 renderer="colorManagement: true; alpha: true">
            
            <a-assets>
                <a-asset-item id="radio-model" src="radio1.glb"></a-asset-item>
            </a-assets>
            
            <a-entity mindar-image-target="targetIndex: 0">
                <a-entity gltf-model="#radio-model"
                          scale="0.5 0.5 0.5"
                          position="0 0.3 0"
                          rotation="0 180 0">
                </a-entity>
                <a-light type="point" color="#c5a059" intensity="0.5" distance="2" position="0 0.5 0"></a-light>
            </a-entity>
            
            <a-entity camera="active: true" look-controls></a-entity>
        </a-scene>
    </div>
    
    <div id="controls">
        <button id="start-btn">📷 START AR</button>
    </div>
    
    <div id="status">⚡ Ready. Tap "START AR" to begin.</div>
    <div class="instruction">📱 Point camera at the poster when the button turns green</div>

    <script>
        const scene = document.querySelector('a-scene');
        const startBtn = document.getElementById('start-btn');
        const statusDiv = document.getElementById('status');
        
        // Check for camera support
        async function checkCameraSupport() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const hasCamera = devices.some(device => device.kind === 'videoinput');
                if (hasCamera) {
                    statusDiv.innerHTML = '✅ Camera found. Tap START AR.';
                    statusDiv.style.color = '#90ee90';
                } else {
                    statusDiv.innerHTML = '⚠️ No camera found. Make sure you have a camera.';
                }
            } catch (err) {
                console.error('Camera check error:', err);
                statusDiv.innerHTML = '❌ Cannot access camera. Check permissions in Settings → Safari → Camera.';
            }
        }
        
        checkCameraSupport();
        
        // Start AR when button is clicked
        startBtn.addEventListener('click', async () => {
            statusDiv.innerHTML = '🔍 Requesting camera access...';
            
            try {
                // First, request camera permission explicitly
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop()); // Stop immediately, we just need permission
                
                statusDiv.innerHTML = '🎥 Camera granted. Starting AR...';
                
                // Start MindAR
                const mindarImage = scene.components['mindar-image'];
                if (mindarImage) {
                    await mindarImage.start();
                    statusDiv.innerHTML = '📷 Camera active. Point at the poster!';
                    statusDiv.style.color = '#c5a059';
                    startBtn.style.opacity = '0.5';
                    startBtn.disabled = true;
                    startBtn.textContent = '✓ CAMERA ACTIVE';
                    
                    // Add detection feedback
                    scene.addEventListener('targetFound', () => {
                        statusDiv.innerHTML = '✨ POSTER DETECTED! Radio appearing... ✨';
                        statusDiv.style.color = '#ffd700';
                        setTimeout(() => {
                            statusDiv.innerHTML = '📷 Camera active. Poster detected!';
                        }, 2000);
                    });
                    
                    scene.addEventListener('targetLost', () => {
                        statusDiv.innerHTML = '🔍 Poster lost. Point camera at poster.';
                        statusDiv.style.color = '#c5a059';
                    });
                } else {
                    throw new Error('MindAR component not found');
                }
            } catch (err) {
                console.error('Camera error:', err);
                statusDiv.innerHTML = '❌ Camera error. Open Settings → Safari → Camera → Allow. Then reload.';
                statusDiv.style.color = '#ff6b6b';
                
                // Show detailed instructions for iOS
                alert('Camera permission required.\n\nGo to iPhone Settings → Safari → Camera → Allow.\nThen refresh and try again.');
            }
        });
        
        // Log errors to console (visible via Safari Web Inspector)
        window.addEventListener('error', (e) => {
            console.error('Page error:', e.error);
            statusDiv.innerHTML = `⚠️ Error: ${e.message.substring(0, 50)}`;
        });
    </script>
</body>
</html>
