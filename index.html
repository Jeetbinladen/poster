<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memorial of the World Around - AR Exhibit</title>
    
 
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.prod.js"></script>
    
 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            background: #080807;
        }
        
        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #080807;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }
        
        .loading-text {
            color: #c5a059;
            font-size: 12px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 300;
        }
        
        .loading-bar-bg {
            width: 200px;
            height: 1px;
            background: rgba(197, 160, 89, 0.2);
            border-radius: 1px;
            overflow: hidden;
        }
        
        .loading-bar-fill {
            width: 0%;
            height: 100%;
            background: #c5a059;
            transition: width 0.3s ease;
        }
        
        
        #ar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
      
        .instruction-overlay {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 200;
            pointer-events: none;
        }
        
        .instruction-card {
            display: inline-block;
            background: rgba(8, 8, 7, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 40px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            color: #c5a059;
            font-size: 12px;
            letter-spacing: 0.1em;
            font-weight: 400;
        }
        
        .instruction-card i {
            font-style: normal;
            display: inline-block;
            margin-right: 8px;
        }
        
      
        .museum-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            text-align: center;
            z-index: 200;
            pointer-events: none;
        }
        
        .museum-header .logo {
            color: rgba(197, 160, 89, 0.8);
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            background: rgba(8, 8, 7, 0.7);
            backdrop-filter: blur(8px);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(197, 160, 89, 0.2);
        }
        
       
        .error-message {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(255, 50, 50, 0.9);
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            z-index: 300;
            display: none;
            backdrop-filter: blur(8px);
        }
        
       
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(5px); }
        }
        
        .scan-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(197, 160, 89, 0.6);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-align: center;
            z-index: 200;
            pointer-events: none;
            white-space: nowrap;
        }
        
        .scan-hint span {
            animation: pulse 1.5s ease infinite;
            display: inline-block;
        }
        
        @media (max-width: 600px) {
            .instruction-card { font-size: 10px; padding: 8px 16px; }
            .museum-header .logo { font-size: 8px; }
            .scan-hint { font-size: 9px; bottom: 80px; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-text">INITIALIZING AR EXHIBIT</div>
        <div class="loading-bar-bg">
            <div class="loading-bar-fill" id="loading-bar"></div>
        </div>
    </div>

    <div id="ar-container">
        <a-scene mindar-image="imageTargetSrc: marker.patt; autoStart: true; uiLoading: false; uiScanning: false; uiError: false;" 
                 vr-mode-ui="enabled: false" 
                 device-orientation-permission-ui="enabled: false"
                 embedded
                 renderer="colorManagement: true; logarithmicDepthBuffer: false; alpha: true"
                 style="width: 100%; height: 100%;">
            
            <a-assets>
                <a-asset-item id="radio-model" src="radio1.glb"></a-asset-item>
            </a-assets>
            
          
            <a-entity mindar-image-target="targetIndex: 0">
                
                <a-entity gltf-model="#radio-model"
                          scale="0.5 0.5 0.5"
                          position="0 0.3 0"
                          rotation="0 180 0"
                          animation="property: rotation.y; to: 360; dur: 15000; easing: linear; loop: true; autoplay: true">
                </a-entity>
                
                
                <a-light type="point" color="#c5a059" intensity="0.5" distance="2" position="0 0.5 0"></a-light>
                <a-light type="ambient" color="#404040" intensity="0.3"></a-light>
            </a-entity>
            
            
            <a-entity mindar-image-target="targetIndex: 0">
                <a-plane position="0 0 -0.1" width="1.2" height="1.2" rotation="-90 0 0"
                         material="color: #080807; opacity: 0; side: double">
                </a-plane>
            </a-entity>
            
        </a-scene>
    </div>

    <div class="museum-header">
        <div class="logo">✦ MEMORIAL OF THE WORLD AROUND ✦</div>
    </div>

    <div class="instruction-overlay">
        <div class="instruction-card">
            <i>📱</i> POINT CAMERA AT POSTER
        </div>
    </div>
    
    <div class="scan-hint">
        <span>▼ PLACE POSTER IN FRAME ▼</span>
    </div>

    <div id="error-message" class="error-message"></div>

    <script>
        
        let loadingBar = document.getElementById('loading-bar');
        let loadingScreen = document.getElementById('loading-screen');
        let arContainer = document.getElementById('ar-container');
        
      
        let progress = 0;
        let interval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        arContainer.style.opacity = '1';
                    }, 1000);
                }, 500);
            }
            loadingBar.style.width = Math.min(progress, 100) + '%';
        }, 200);
        
        
        const scene = document.querySelector('a-scene');
        
        scene.addEventListener('ar-ready', () => {
            console.log('AR Ready - Point camera at the poster');
        });
        
        scene.addEventListener('targetFound', () => {
            console.log('Poster detected! Radio appearing...');
            
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
        });
        
        scene.addEventListener('targetLost', () => {
            console.log('Poster lost');
        });
        
        scene.addEventListener('ar-error', (err) => {
            console.error('AR Error:', err);
            showError('Camera access required. Please allow camera permissions and ensure you are using HTTPS.');
        });
        
        function showError(msg) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            console.warn('Camera may not work without HTTPS');
        }
        
       
        document.body.addEventListener('click', () => {
            const video = document.querySelector('video');
            if (video && video.readyState === 0) {
                console.log('User interacted - camera can start');
            }
        });
    </script>
</body>
</html>
