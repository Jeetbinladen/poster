<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memorial of the World Around - AR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: system-ui, sans-serif; background: #000; }

        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 999;
        }
        #splash h1 {
            color: #c5a059;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            padding: 0 20px;
        }
        #splash p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            text-align: center;
            padding: 0 30px;
        }
        #start-btn {
            background: #c5a059;
            color: #000;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        #start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            position: fixed;
            top: 20px;
            left: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            color: #c5a059;
            padding: 10px 14px;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            z-index: 500;
            display: none;
        }

        #hint {
            position: fixed;
            bottom: 30px;
            left: 0; right: 0;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            z-index: 500;
            display: none;
        }

        a-scene {
            position: fixed;
            inset: 0;
        }
    </style>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

    <div id="splash">
        <h1>Memorial of the World Around</h1>
        <p>Tap the button below, then point your camera at the poster.</p>
        <button id="start-btn">START AR</button>
        <p id="err-msg" style="color:#ff6b6b; display:none;"></p>
    </div>

    <div id="status"></div>
    <div id="hint">Point camera at the poster</div>

    <a-scene id="ar-scene"
             mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiError: no; uiScanning: no;"
             color-space="sRGB"
             renderer="colorManagement: true"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false"
             embedded>

        <a-assets>
            <a-asset-item id="model" src="./asset.glb"></a-asset-item>
        </a-assets>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-entity
                gltf-model="#model"
                scale="0.5 0.5 0.5"
                position="0 0.2 0"
                rotation="0 180 0"
                animation-mixer>
            </a-entity>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const splash   = document.getElementById('splash');
        const startBtn = document.getElementById('start-btn');
        const errMsg   = document.getElementById('err-msg');
        const status   = document.getElementById('status');
        const hint     = document.getElementById('hint');
        const scene    = document.getElementById('ar-scene');
        const target   = document.getElementById('target');

        function showStatus(msg) {
            status.style.display = 'block';
            status.textContent = msg;
        }

        function showError(msg) {
            errMsg.style.display = 'block';
            errMsg.textContent = msg;
            startBtn.disabled = false;
            startBtn.textContent = 'TRY AGAIN';
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            startBtn.textContent = 'STARTING...';
            errMsg.style.display = 'none';

            // 1. Request camera permission explicitly first
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                stream.getTracks().forEach(t => t.stop());
            } catch (e) {
                showError('Camera permission denied. Please allow camera access and try again.');
                return;
            }

            // 2. Hide splash, show scene
            splash.style.display = 'none';
            showStatus('Loading AR engine...');
            hint.style.display = 'block';

            // 3. Poll for mindar-image component controller to be ready then call start()
            let attempts = 0;
            const maxAttempts = 100; // 10 seconds

            const poll = setInterval(async () => {
                attempts++;
                const mindar = scene.components['mindar-image'];

                if (mindar && mindar.controller) {
                    clearInterval(poll);
                    showStatus('Starting camera...');
                    try {
                        await mindar.start();
                        showStatus('📷 Point at the poster!');
                        setTimeout(() => { status.style.display = 'none'; }, 3000);
                    } catch(e) {
                        splash.style.display = 'flex';
                        showError('Failed to start AR: ' + e.message);
                    }
                    return;
                }

                if (attempts >= maxAttempts) {
                    clearInterval(poll);
                    splash.style.display = 'flex';
                    showError('AR engine timed out. Please refresh the page.');
                }
            }, 100);
        });

        // Target detection events
        target.addEventListener('targetFound', () => {
            showStatus('✅ Poster detected!');
            setTimeout(() => { status.style.display = 'none'; }, 2000);
        });

        target.addEventListener('targetLost', () => {
            showStatus('🔍 Poster lost — reposition your camera');
        });
    </script>
</body>
</html>
