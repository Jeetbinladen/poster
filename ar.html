<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Memorial AR - Simple</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui;
        }
        #container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
        }
        #instruction {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: #c5a059;
            padding: 12px;
            font-size: 14px;
            z-index: 100;
            font-weight: bold;
        }
        #status {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px;
            font-size: 12px;
            z-index: 100;
        }
        button {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #c5a059;
            color: black;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 40px;
            z-index: 200;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="status">Ready. Tap button to start camera.</div>
    <div id="instruction">Point camera at the MEMORIAL OF THE WORLD AROUND poster</div>
    <button id="startBtn">START CAMERA</button>

    <script>
        const container = document.getElementById('container');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        
        let video, canvas, ctx, animationId;
        let isRunning = false;
        
        // Create video element
        video = document.createElement('video');
        video.setAttribute('autoplay', '');
        video.setAttribute('playsinline', '');
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.objectFit = 'cover';
        video.style.position = 'absolute';
        video.style.top = '0';
        video.style.left = '0';
        
        // Create canvas for overlay
        canvas = document.createElement('canvas');
        canvas.style.position = 'absolute';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.objectFit = 'cover';
        ctx = canvas.getContext('2d');
        
        let stream = null;
        
        async function startCamera() {
            statusDiv.innerText = 'Requesting camera...';
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                
                video.srcObject = stream;
                await video.play();
                
                statusDiv.innerText = 'Camera active. Point at poster.';
                startBtn.classList.add('hidden');
                isRunning = true;
                
                // Set canvas size
                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();
                
                // Start drawing overlay
                function drawOverlay() {
                    if (!isRunning) return;
                    
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        // Draw the video frame
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        // Draw a simple target reticle to help user aim
                        const centerX = canvas.width / 2;
                        const centerY = canvas.height / 2;
                        
                        ctx.beginPath();
                        ctx.strokeStyle = '#c5a059';
                        ctx.lineWidth = 2;
                        ctx.rect(centerX - 100, centerY - 100, 200, 200);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(centerX - 120, centerY);
                        ctx.lineTo(centerX - 100, centerY);
                        ctx.moveTo(centerX + 120, centerY);
                        ctx.lineTo(centerX + 100, centerY);
                        ctx.moveTo(centerX, centerY - 120);
                        ctx.lineTo(centerX, centerY - 100);
                        ctx.moveTo(centerX, centerY + 120);
                        ctx.lineTo(centerX, centerY + 100);
                        ctx.stroke();
                        
                        ctx.font = '12px system-ui';
                        ctx.fillStyle = '#c5a059';
                        ctx.textAlign = 'center';
                        ctx.fillText('Place poster here', centerX, centerY - 110);
                    }
                    
                    animationId = requestAnimationFrame(drawOverlay);
                }
                
                drawOverlay();
                
                // Add the elements to page
                container.appendChild(video);
                container.appendChild(canvas);
                
            } catch (err) {
                console.error(err);
                statusDiv.innerText = 'Camera error: ' + err.message;
                if (err.name === 'NotAllowedError') {
                    statusDiv.innerText = 'Please allow camera access in Settings > Safari > Camera';
                }
            }
        }
        
        function stopCamera() {
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }
        
        startBtn.addEventListener('click', startCamera);
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            stopCamera();
        });
    </script>
</body>
</html>
